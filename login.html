<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tweaks | Login to Continue</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/auth.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        
        /* Video Background */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.4);
        }
        
        .overlay-text {
            position: fixed;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <video class="video-bg" autoplay loop muted playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-animation-of-colored-neon-lights-4148-large.mp4" type="video/mp4">
    </video>
    
    <div class="auth-container">
        <div class="auth-card" id="authCard">
            <div class="auth-logo">
                <h1>TWEAKS</h1>
                <p>Where moments go viral ✨</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <!-- Login Form -->
            <div id="loginForm">
                <div class="auth-input-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email">
                </div>
                <div class="auth-input-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>
                <button class="auth-btn" id="loginBtn">Log In</button>
                
                <div class="auth-divider">or</div>
                
                <button class="auth-btn auth-btn-google" id="googleLoginBtn">
                    <i class="fab fa-google"></i>
                    Continue with Google
                </button>
                
                <div class="auth-footer">
                    Don't have an account? <a href="#" id="showSignup">Sign up</a>
                </div>
            </div>
            
            <!-- Signup Form (hidden initially) -->
            <div id="signupForm" style="display: none;">
                <div class="auth-input-group">
                    <label>Username</label>
                    <input type="text" id="signupUsername" placeholder="Choose a username">
                </div>
                <div class="auth-input-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="Enter your email">
                </div>
                <div class="auth-input-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="Create a password">
                </div>
                <div class="auth-input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" placeholder="Confirm your password">
                </div>
                <button class="auth-btn" id="signupBtn">Sign Up</button>
                
                <div class="auth-divider">or</div>
                
                <button class="auth-btn auth-btn-google" id="googleSignupBtn">
                    <i class="fab fa-google"></i>
                    Sign up with Google
                </button>
                
                <div class="auth-footer">
                    Already have an account? <a href="#" id="showLogin">Log in</a>
                </div>
            </div>
        </div>
    </div>
    
    <div class="overlay-text">
        <i class="fas fa-music"></i> 50M+ videos | Trending daily
    </div>

    <script type="module">
        import { 
            auth, 
            signInWithPopup, 
            googleProvider, 
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            db,
            doc,
            setDoc,
            serverTimestamp
        } from './js/firebase-config.js';
        
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const showSignup = document.getElementById('showSignup');
        const showLogin = document.getElementById('showLogin');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const googleSignupBtn = document.getElementById('googleSignupBtn');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
        }
        
        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => { successDiv.style.display = 'none'; }, 2000);
        }
        
        // Toggle between login and signup
        showSignup.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            signupForm.style.display = 'block';
        });
        
        showLogin.addEventListener('click', (e) => {
            e.preventDefault();
            signupForm.style.display = 'none';
            loginForm.style.display = 'block';
        });
        
        // Email/Password Login
        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    showError('No account found with this email');
                } else if (error.code === 'auth/wrong-password') {
                    showError('Incorrect password');
                } else {
                    showError(error.message);
                }
            }
        });
        
        // Email/Password Signup
        signupBtn.addEventListener('click', async () => {
            const username = document.getElementById('signupUsername').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            if (!username || !email || !password) {
                showError('Please fill in all fields');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                // Create user profile in Firestore
                await setDoc(doc(db, 'users', userCredential.user.uid), {
                    username: username,
                    email: email,
                    avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${username}`,
                    bio: 'New to Tweaks! 🚀',
                    followers: [],
                    following: [],
                    likes: 0,
                    videos: 0,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                });
                
                showSuccess('Account created! Redirecting...');
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    showError('Email already registered');
                } else {
                    showError(error.message);
                }
            }
        });
        
        // Google Login/Signup
        async function handleGoogleAuth() {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                
                // Check if user exists in Firestore
                const userDoc = await import('./js/firebase-config.js').then(module => 
                    module.getDoc(module.doc(module.db, 'users', user.uid))
                );
                
                if (!userDoc.exists()) {
                    // Create new user profile
                    await setDoc(doc(db, 'users', user.uid), {
                        username: user.displayName?.replace(/\s/g, '_').toLowerCase() || 'user_' + user.uid.slice(0, 8),
                        email: user.email,
                        avatar: user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`,
                        bio: 'Joined via Google! ✨',
                        followers: [],
                        following: [],
                        likes: 0,
                        videos: 0,
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp()
                    });
                }
                
                showSuccess('Google login successful!');
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);
            } catch (error) {
                showError(error.message);
            }
        }
        
        googleLoginBtn.addEventListener('click', handleGoogleAuth);
        googleSignupBtn.addEventListener('click', handleGoogleAuth);
        
        // Check if already logged in
        import { onAuthStateChanged } from './js/firebase-config.js';
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = '/index.html';
            }
        });
    </script>
</body>
</html>
