<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tweaks | Login</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .auth-card {
            background: rgba(20,20,30,0.95);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 48px; font-weight: 900; font-style: italic; background: linear-gradient(135deg, #f0abfc, #d946ef); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 8px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 14px 16px; color: white; font-size: 15px; outline: none; transition: all 0.2s; }
        .input-group input:focus { border-color: #d946ef; background: rgba(255,255,255,0.15); }
        
        .btn { width: 100%; background: linear-gradient(135deg, #d946ef, #a855f7); border: none; border-radius: 32px; padding: 14px; color: white; font-weight: 700; font-size: 16px; cursor: pointer; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        
        .btn-google { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 16px; }
        
        .divider { text-align: center; color: rgba(255,255,255,0.4); font-size: 12px; margin: 24px 0; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: rgba(255,255,255,0.2); }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        
        .footer { text-align: center; margin-top: 24px; color: rgba(255,255,255,0.5); font-size: 13px; }
        .footer a { color: #d946ef; text-decoration: none; font-weight: 600; }
        
        .error-message { background: rgba(255,69,58,0.2); border: 1px solid #ff453a; border-radius: 12px; padding: 10px; color: #ff6b6b; font-size: 12px; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">
            <h1>TWEAKS</h1>
            <p>Where moments go viral ✨</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div id="loginForm">
            <div class="input-group"><input type="email" id="loginEmail" placeholder="Email"></div>
            <div class="input-group"><input type="password" id="loginPassword" placeholder="Password"></div>
            <button class="btn" id="loginBtn">Log In</button>
            <button class="btn btn-google" id="googleLoginBtn"><i class="fab fa-google"></i> Continue with Google</button>
            <div class="divider">or</div>
            <div class="footer">Don't have an account? <a href="#" id="showSignup">Sign up</a></div>
        </div>
        
        <div id="signupForm" style="display: none;">
            <div class="input-group"><input type="text" id="signupUsername" placeholder="Username"></div>
            <div class="input-group"><input type="email" id="signupEmail" placeholder="Email"></div>
            <div class="input-group"><input type="password" id="signupPassword" placeholder="Password"></div>
            <div class="input-group"><input type="password" id="signupConfirmPassword" placeholder="Confirm Password"></div>
            <button class="btn" id="signupBtn">Sign Up</button>
            <button class="btn btn-google" id="googleSignupBtn"><i class="fab fa-google"></i> Sign up with Google</button>
            <div class="divider">or</div>
            <div class="footer">Already have an account? <a href="#" id="showLogin">Log in</a></div>
        </div>
    </div>

    <script type="module">
        import { auth, signInWithPopup, googleProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, db, doc, setDoc, serverTimestamp, onAuthStateChanged } from './js/firebase-config.js';
        
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const errorDiv = document.getElementById('errorMessage');
        
        function showError(message) { errorDiv.textContent = message; errorDiv.style.display = 'block'; setTimeout(() => { errorDiv.style.display = 'none'; }, 3000); }
        
        document.getElementById('showSignup').addEventListener('click', (e) => { e.preventDefault(); loginForm.style.display = 'none'; signupForm.style.display = 'block'; });
        document.getElementById('showLogin').addEventListener('click', (e) => { e.preventDefault(); signupForm.style.display = 'none'; loginForm.style.display = 'block'; });
        
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) { showError('Please fill in all fields'); return; }
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = '/index.html';
            } catch (error) { showError(error.message); }
        });
        
        document.getElementById('signupBtn').addEventListener('click', async () => {
            const username = document.getElementById('signupUsername').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirmPassword').value;
            if (!username || !email || !password) { showError('Please fill in all fields'); return; }
            if (password !== confirm) { showError('Passwords do not match'); return; }
            if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, 'users', userCredential.user.uid), {
                    username: username, email: email, avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${username}`,
                    bio: 'New to Tweaks! 🚀', followers: [], following: [], likes: 0, videos: 0,
                    createdAt: serverTimestamp(), updatedAt: serverTimestamp()
                });
                window.location.href = '/index.html';
            } catch (error) { showError(error.message); }
        });
        
        const handleGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                const userDoc = await import('./js/firebase-config.js').then(m => m.getDoc(m.doc(m.db, 'users', user.uid)));
                if (!userDoc.exists()) {
                    await setDoc(doc(db, 'users', user.uid), {
                        username: user.displayName?.replace(/\s/g, '_').toLowerCase() || 'user_' + user.uid.slice(0, 8),
                        email: user.email, avatar: user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`,
                        bio: 'Joined via Google! ✨', followers: [], following: [], likes: 0, videos: 0,
                        createdAt: serverTimestamp(), updatedAt: serverTimestamp()
                    });
                }
                window.location.href = '/index.html';
            } catch (error) { showError(error.message); }
        };
        
        document.getElementById('googleLoginBtn').addEventListener('click', handleGoogle);
        document.getElementById('googleSignupBtn').addEventListener('click', handleGoogle);
        
        onAuthStateChanged(auth, (user) => { if (user) window.location.href = '/index.html'; });
    </script>
</body>
</html>
